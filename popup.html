<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Status bar -->
  <div id="status" class="status status--disconnected">
    <span id="status-icon" class="status-icon"></span>
    <span id="status-text">Checking…</span>
  </div>

  <!-- Actions (disabled until context confirmed) -->
  <div id="actions" class="actions disabled">

    <!-- Edit MCQs -->
    <details class="card" open>
      <summary>Edit MCQs</summary>
      <div class="card-body">
        <label>Points <input type="number" id="mcq-points" value="1" min="0" step="0.5"></label>
        <label class="checkbox-label"><input type="checkbox" id="mcq-shuffle" checked> Shuffle choices</label>
        <button class="btn" data-action="editMCQ">Run</button>
      </div>
    </details>

    <!-- Edit Matching -->
    <details class="card">
      <summary>Edit Matching</summary>
      <div class="card-body">
        <label>Points <input type="number" id="match-points" value="3" min="0" step="0.5"></label>
        <label class="checkbox-label"><input type="checkbox" id="match-shuffle" checked> Shuffle pairs</label>
        <button class="btn" data-action="editMatching">Run</button>
      </div>
    </details>

    <!-- Edit Short Answer -->
    <details class="card">
      <summary>Edit Short Answer</summary>
      <div class="card-body">
        <label>Points <input type="number" id="short-points" value="2" min="0" step="0.5"></label>
        <label>Similarity % <input type="number" id="short-similarity" value="60" min="0" max="100"></label>
        <button class="btn" data-action="editShort">Run</button>
      </div>
    </details>

    <!-- Import Fill-in-Blank -->
    <details class="card card--import">
      <summary>Import Fill-in-Blank</summary>
      <div class="card-body">
        <label class="file-label">
          <span>Excel (.xlsx) or QTI XML (.xml)</span>
          <input type="file" id="fib-file" accept=".xml,.xlsx,.xls">
        </label>
        <div id="fib-preview" class="file-preview"></div>
        <label>Points per blank <input type="number" id="fib-points" value="1" min="0" step="0.5"></label>
        <label class="checkbox-label"><input type="checkbox" id="fib-shuffle"> Shuffle choices</label>
        <button class="btn btn--import" data-action="importFIB" disabled>Import 0 questions</button>
      </div>
    </details>

    <!-- Delete -->
    <details class="card card--danger">
      <summary>Delete Selected</summary>
      <div class="card-body">
        <p class="warning">Archives all selected questions. This cannot be undone from the UI.</p>
        <button class="btn btn--danger" data-action="deleteSelected">Delete</button>
      </div>
    </details>
  </div>

  <!-- Log -->
  <div id="log" class="log"></div>

  <script src="lib/xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
