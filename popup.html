<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Status bar -->
  <div id="status" class="status status--disconnected">
    <span id="status-icon" class="status-icon"></span>
    <span id="status-text">Checking…</span>
  </div>

  <!-- Tab bar -->
  <nav id="tab-bar" class="tab-bar">
    <button class="tab active" data-tab="import">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Import
    </button>
    <button class="tab" data-tab="edit">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>
    <button class="tab" data-tab="delete">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      Delete
    </button>
  </nav>

  <!-- Tab panels (disabled until context confirmed) -->
  <div id="actions" class="actions disabled">

    <!-- ═══ IMPORT TAB ═══ -->
    <div class="tab-panel active" data-panel="import">

      <!-- Shared file input -->
      <div class="file-input-area">
        <label class="file-label">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b1fa2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Choose Excel (.xlsx) or QTI XML (.xml)</span>
          <input type="file" id="import-file" accept=".xml,.xlsx,.xls">
        </label>
        <div id="file-summary" class="file-summary"></div>
      </div>

      <!-- Fill-in-Blank -->
      <details class="card card--import" id="card-fib">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
          Fill-in-Blank <span class="badge" id="badge-fib">0</span>
        </summary>
        <div class="card-body">
          <label>Points per blank <input type="number" id="fib-points" value="1" min="0" step="0.5"></label>
          <label class="checkbox-label"><input type="checkbox" id="fib-shuffle"> Shuffle choices</label>
          <button class="btn btn--import" data-action="importFIB" disabled>Import</button>
        </div>
      </details>

      <!-- MCQ -->
      <details class="card card--import" id="card-mcq">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
          Multiple Choice <span class="badge" id="badge-mcq">0</span>
        </summary>
        <div class="card-body">
          <label>Points <input type="number" id="mcq-import-points" value="1" min="0" step="0.5"></label>
          <label class="checkbox-label"><input type="checkbox" id="mcq-import-shuffle" checked> Shuffle choices</label>
          <button class="btn btn--import" data-action="importMCQ" disabled>Import</button>
        </div>
      </details>

      <!-- Matching -->
      <details class="card card--import" id="card-matching">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="10" y2="6"/><line x1="14" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="20" y2="18"/><path d="M10 6l4 6"/><path d="M10 12l4-6"/><path d="M10 18l4-6"/></svg>
          Matching <span class="badge" id="badge-matching">0</span>
        </summary>
        <div class="card-body">
          <label>Points per pair <input type="number" id="match-import-points" value="1" min="0" step="0.5"></label>
          <label class="checkbox-label"><input type="checkbox" id="match-import-shuffle" checked> Shuffle pairs</label>
          <button class="btn btn--import" data-action="importMatching" disabled>Import</button>
        </div>
      </details>

      <!-- Short Answer -->
      <details class="card card--import" id="card-short">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="13" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          Short Answer <span class="badge" id="badge-short">0</span>
        </summary>
        <div class="card-body">
          <label>Points <input type="number" id="short-import-points" value="1" min="0" step="0.5"></label>
          <label>Similarity % <input type="number" id="short-import-similarity" value="60" min="0" max="100"></label>
          <button class="btn btn--import" data-action="importShort" disabled>Import</button>
        </div>
      </details>
    </div>

    <!-- ═══ EDIT TAB ═══ -->
    <div class="tab-panel" data-panel="edit">
      <p class="tab-hint">Select questions in the library, then edit in bulk.</p>

      <details class="card" open>
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
          MCQs
        </summary>
        <div class="card-body">
          <label>Points <input type="number" id="mcq-points" value="1" min="0" step="0.5"></label>
          <label class="checkbox-label"><input type="checkbox" id="mcq-shuffle" checked> Shuffle choices</label>
          <button class="btn" data-action="editMCQ">Run</button>
        </div>
      </details>

      <details class="card">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="10" y2="6"/><line x1="14" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="20" y2="12"/></svg>
          Matching
        </summary>
        <div class="card-body">
          <label>Points <input type="number" id="match-points" value="3" min="0" step="0.5"></label>
          <label class="checkbox-label"><input type="checkbox" id="match-shuffle" checked> Shuffle pairs</label>
          <button class="btn" data-action="editMatching">Run</button>
        </div>
      </details>

      <details class="card">
        <summary>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="13" y1="14" x2="3" y2="14"/></svg>
          Short Answer
        </summary>
        <div class="card-body">
          <label>Points <input type="number" id="short-points" value="2" min="0" step="0.5"></label>
          <label>Similarity % <input type="number" id="short-similarity" value="60" min="0" max="100"></label>
          <button class="btn" data-action="editShort">Run</button>
        </div>
      </details>
    </div>

    <!-- ═══ DELETE TAB ═══ -->
    <div class="tab-panel" data-panel="delete">
      <div class="card card--danger">
        <div class="card-body" style="padding-top:14px">
          <p class="warning">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Select questions in the library, then click Delete. This archives all selected questions and <strong>cannot be undone</strong> from the Cadmus UI.
          </p>
          <button class="btn btn--danger" data-action="deleteSelected">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete Selected
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Log -->
  <div id="log" class="log"></div>

  <script src="lib/xlsx.mini.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
